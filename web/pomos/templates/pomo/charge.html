<div class="charge-ritual" x-data="{ focused: false }">
  <!-- Ambient orbs -->
  <div class="charge-ritual__ambient" aria-hidden="true">
    <div class="charge-ritual__orb charge-ritual__orb--primary"></div>
    <div class="charge-ritual__orb charge-ritual__orb--secondary"></div>
  </div>

  <!-- Single glass pane -->
  <div class="charge-ritual__pane">

    <!-- Identity Zone — the artifact header -->
    <div class="ritual__identity">
      <h1 class="ritual__task-name">{{ quest_title }}</h1>
      {% if engine.is_resume %}
      <span class="ritual__meta">Resumed &middot; Lap {{ engine.lap }}</span>
      {% elif engine.streak > 1 %}
      <span class="ritual__meta">Streak &#x1F525; &times; {{ engine.streak }}</span>
      {% endif %}
      <!-- Ghost meta strip — quest context, no box -->
      <div class="pomo-quest-meta"
           hx-get="/quests/{{ engine.session.quest_id }}/meta-strip"
           hx-trigger="load"
           hx-swap="innerHTML">
      </div>
    </div>

    <form id="charge-form"
          class="charge-ritual__form"
          hx-post="/pomos/charge"
          hx-target="#pomo-panel"
          hx-swap="outerHTML">

      <!-- Intent Zone — the moment of commitment -->
      <div class="ritual__intent">
        <h2 class="ritual__action">Declare your intent</h2>
        <p class="ritual__supporting">Name the one thing you will have forged when this pomo ends.</p>

        <div class="charge-ritual__input-wrap"
             :class="{ 'charge-ritual__input-wrap--focus': focused }">
          <input type="text"
                 name="charge"
                 id="charge-input"
                 class="charge-ritual__input"
                 required
                 minlength="3"
                 maxlength="120"
                 autofocus
                 placeholder="I will..."
                 @focus="focused = true"
                 @blur="focused = false">
          <div class="charge-ritual__input-line"></div>
        </div>
      </div>

    </form>

    <!-- Quest checklist — lazy-loaded, persists across pomos -->
    <div id="quest-checklist-{{ engine.session.quest_id }}"
         hx-get="/quests/{{ engine.session.quest_id }}/checklist"
         hx-trigger="load"
         hx-swap="outerHTML">
    </div>

    <!-- Action Zone — finality anchor at bottom -->
    <div class="ritual__action-zone">
      <button type="submit" form="charge-form" class="charge-ritual__seal">
        <span class="charge-ritual__seal-text">Begin Forging</span>
      </button>
    </div>
  </div>
</div>
