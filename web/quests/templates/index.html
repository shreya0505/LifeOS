{% extends "base.html" %}

{% block content %}
<!-- Quest Board (left / main) -->
<section class="quest-board">
  <!-- Add Quest Form -->
  <form class="add-quest-form"
        hx-post="/quests"
        hx-target="#quest-board"
        hx-swap="innerHTML"
        hx-on::after-request="this.reset()">
    <input type="text" name="title"
           class="add-quest-form__input"
           placeholder="Inscribe a new quest..."
           required minlength="1"
           autocomplete="off">
    <button type="submit" class="btn btn--copper">📜 Add Quest</button>
  </form>

  <!-- Board columns -->
  <div id="quest-board">
    {% include "board.html" %}
  </div>
</section>

<!-- Sidebar (right) -->
<aside class="sidebar">
  <div class="sidebar-panel">
    <h3 class="sidebar-panel__title">✦ Chronicle</h3>
    <div id="chronicle-slot"
         hx-get="/chronicle"
         hx-trigger="load, quest-changed from:body"
         hx-swap="innerHTML">
    </div>
  </div>
  <div class="sidebar-panel">
    <h3 class="sidebar-panel__title">⚔ Hall of Valor</h3>
    <div id="trophy-slot"
         hx-get="/trophies"
         hx-trigger="load, quest-changed from:body"
         hx-swap="innerHTML">
    </div>
  </div>
  <div class="sidebar-panel sidebar-panel--actions">
    <button class="btn btn--ghost btn--sm"
            hx-get="/dashboard"
            hx-target="body"
            hx-swap="beforeend">
      📊 War Room
    </button>
  </div>
</aside>

<!-- Slot for confirm modals -->
<div id="confirm-slot"></div>
{% endblock %}
