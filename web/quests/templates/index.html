{% extends "base.html" %}

{% block content %}
<div x-data="{ tab: 'board' }" x-init="
  // Sync navbar active state with initial Alpine tab
  document.querySelectorAll('.app-navbar__link[data-tab]').forEach(btn => {
    btn.classList.toggle('is-active', btn.dataset.tab === tab);
  });
  $watch('tab', value => {
    document.querySelectorAll('.app-navbar__link[data-tab]').forEach(btn => {
      btn.classList.toggle('is-active', btn.dataset.tab === value);
    });
  })
">

  <!-- ── Tab: Inscribe ─────────────────────────────────────── -->
  <section class="tab-panel" x-show="tab === 'inscribe'" x-transition:enter="tab-enter"
    x-transition:enter-start="tab-enter-from" x-transition:enter-end="tab-enter-to">
    <div class="inscribe-panel">
      <div class="inscribe-glass" @mousemove="
          const r = $el.getBoundingClientRect();
          const x = ($event.clientX - r.left) / r.width;
          const y = ($event.clientY - r.top) / r.height;
          $el.style.transform = `perspective(800px) rotateY(${(x - 0.5) * 8}deg) rotateX(${(0.5 - y) * 6}deg)`;
        " @mouseleave="$el.style.transform = 'perspective(800px) rotateY(0deg) rotateX(0deg)'">
        <h2 class="inscribe-panel__heading">Inscribe Your Quest</h2>
        <form class="add-quest-form" hx-post="/quests" hx-target="#quest-board" hx-swap="innerHTML"
          hx-on::after-request="this.reset(); $data.tab = 'board'">
          <input type="text" name="title" class="add-quest-form__input" placeholder="What will you conquer today?"
            required minlength="1" autocomplete="off">
          <button type="submit" class="btn btn--copper btn--zap">✨ Add</button>
        </form>
        <p class="inscribe-panel__hint">Press <kbd>n</kbd> from any tab to jump here</p>
      </div>
    </div>
  </section>

  <!-- ── Tab: Board (Kanban) ───────────────────────────────── -->
  <section class="tab-panel" x-show="tab === 'board'" x-transition:enter="tab-enter"
    x-transition:enter-start="tab-enter-from" x-transition:enter-end="tab-enter-to">
    <div id="quest-board">
      {% include "board.html" %}
    </div>
  </section>

  <!-- ── Tab: Metrics (The Grand Ledger) ─────────────────── -->
  <section class="tab-panel" x-show="tab === 'metrics'" x-transition:enter="tab-enter"
    x-transition:enter-start="tab-enter-from" x-transition:enter-end="tab-enter-to">

    <!-- Editorial Header -->
    <header class="ledger-header">
      <h1 class="ledger-header__title">The Grand Ledger</h1>
      <p class="ledger-header__subtitle">Volume {{ volume_number }} · Year of the Verdant Forge</p>
    </header>

    <!-- Section 1: The Chronicle (Retrospective) -->
    <section class="ledger-section">
      <div class="ledger-section__head">
        <h2 class="ledger-section__title">The Chronicle</h2>
        <span class="ledger-section__badge">● 12 Week Horizon</span>
      </div>
      <div id="chronicle-slot" hx-get="/chronicle" hx-trigger="load, quest-changed from:body" hx-swap="innerHTML">
      </div>
    </section>

    <!-- Section 2: Hall of Valor (Gamified) -->
    <section class="ledger-valor">
      <div id="trophy-slot" hx-get="/trophies" hx-trigger="load, quest-changed from:body" hx-swap="innerHTML">
      </div>
    </section>

  </section>

</div>

<!-- Slot for confirm modals -->
<div id="confirm-slot"></div>
{% endblock %}
