<div class="modal-backdrop" id="confirm-modal"
     x-data="{ open: true }"
     x-show="open"
     @keydown.escape.window="document.getElementById('confirm-modal')?.remove()">
  <div class="modal-card" @click.stop>
    <h3 class="modal-card__title">🗑 Erase from the Chronicles?</h3>
    <p class="modal-card__body">"{{ quest_title }}"</p>
    <div class="modal-card__actions">
      <button class="btn btn--ghost"
              onclick="document.getElementById('confirm-modal').remove()">
        Cancel
      </button>
      <button class="btn btn--ember"
              hx-delete="/quests/{{ quest_id }}"
              hx-target="#quest-board"
              hx-swap="innerHTML"
              onclick="document.getElementById('confirm-modal').remove()">
        Yes, Destroy It
      </button>
    </div>
  </div>
</div>
