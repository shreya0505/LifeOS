{% from 'components/icons.html' import icon %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Saga{% endblock %}</title>
<link rel="icon" type="image/png" href="/static/assets/logo.png">
<link rel="stylesheet" href="/static/reset.css?v=2">
<link rel="stylesheet" href="/static/tokens.css?v=2">
<link rel="stylesheet" href="/static/sync.css?v=1">
<link rel="stylesheet" href="/static/saga.css?v=1">
<script src="/static/htmx.min.js" defer></script>
<script src="/static/alpine-collapse.min.js" defer></script>
<script src="/static/alpine.min.js" defer></script>
<script src="/static/chart.min.js" defer></script>
<script src="/static/apexcharts.min.js" defer></script>
<script src="/static/saga_dashboard.js?v=1" defer></script>
</head>
<body class="saga-page" hx-headers='{"X-Requested-With": "htmx"}'>
<header class="saga-navbar">
  <div class="saga-navbar__brand">
    <a href="/saga" class="saga-brand">Saga</a>
  </div>
  <nav class="saga-navbar__nav">
    <button class="saga-nav-link{% if active_tab|default('today') == 'today' %} is-active{% endif %}" data-saga-tab="today" type="button" onclick="switchSagaTab('today')">Campfire</button>
    <button class="saga-nav-link{% if active_tab|default('today') == 'timeline' %} is-active{% endif %}" data-saga-tab="timeline" type="button" onclick="switchSagaTab('timeline')">Chronicle</button>
    <button class="saga-nav-link{% if active_tab|default('today') == 'metrics' %} is-active{% endif %}" data-saga-tab="metrics" type="button" onclick="switchSagaTab('metrics')">Stats</button>
  </nav>
  <div class="saga-navbar__end">
    <div hx-get="/sync/panel" hx-trigger="load, every {{ sync_ui_poll_seconds() }}s" hx-swap="outerHTML"></div>
    <a href="/" class="saga-navbar__switch" title="Questlog">Questlog</a>
    <a href="/challenge" class="saga-navbar__switch" title="Hard 90">Hard 90</a>
  </div>
</header>

<main class="saga-main">
  {% block content %}{% endblock %}
</main>

{% if test_mode_enabled() %}
<div hx-get="/test/bar" hx-trigger="load" hx-swap="outerHTML"></div>
{% endif %}

<script>
  function switchSagaTab(tabName) {
    document.querySelectorAll('.saga-nav-link[data-saga-tab]').forEach(btn => {
      btn.classList.toggle('is-active', btn.dataset.sagaTab === tabName);
    });
    const root = document.querySelector('[data-saga-root]');
    if (root && root._x_dataStack) {
      root._x_dataStack[0].tab = tabName;
    } else if (tabName === 'today') {
      window.location.href = '/saga';
      return;
    } else if (tabName === 'metrics') {
      window.location.href = '/saga/metrics';
      return;
    } else if (tabName === 'timeline') {
      window.location.href = '/saga';
      return;
    }
    if (tabName === 'timeline') htmx.trigger('#saga-timeline-slot', 'refresh');
    if (tabName === 'metrics') htmx.trigger('#saga-metrics-slot', 'refresh');
  }
</script>
</body>
</html>
