{% if entries %}
<div class="saga-recent">
  {% for entry in entries %}
  <section class="saga-entry-row" x-data="{ open: false }">
    <button class="saga-entry-row__toggle"
            type="button"
            :aria-expanded="open.toString()"
            @click="open = !open">
      <span class="saga-entry-row__time">{{ entry.timestamp[11:16] }}</span>
      <span class="saga-entry-row__content">
        <span class="saga-entry-row__label">{{ entry.mood_word }}</span>
        {% if entry.note %}
        <span class="saga-entry-row__note">{{ entry.note_html | safe }}</span>
        {% endif %}
      </span>
      <span class="saga-entry-row__meta">
        {{ entry.quadrant_label | default(entry.quadrant) }} · E:{{ entry.energy }} P:{{ entry.pleasantness }}
      </span>
      <span class="saga-entry-row__chevron" aria-hidden="true"></span>
    </button>
    <form class="saga-entry-edit"
          x-show="open"
          x-collapse
          x-cloak
          hx-patch="/saga/entries/{{ entry.id }}"
          hx-target="#saga-recent"
          hx-swap="innerHTML">
      <label>
        <span>Energy</span>
        <input name="energy" type="number" min="-7" max="7" value="{{ entry.energy }}">
      </label>
      <label>
        <span>Pleasantness</span>
        <input name="pleasantness" type="number" min="-7" max="7" value="{{ entry.pleasantness }}">
      </label>
      <label>
        <span>Word</span>
        <input name="mood_word" value="{{ entry.mood_word }}" maxlength="40">
      </label>
      <label class="saga-entry-edit__note">
        <span>Note</span>
        <textarea name="note" rows="4">{{ entry.note or "" }}</textarea>
      </label>
      <div class="saga-entry-edit__actions">
        <button type="submit">Save</button>
        <button type="button"
                hx-delete="/saga/entries/{{ entry.id }}"
                hx-target="#saga-recent"
                hx-swap="innerHTML">Delete</button>
      </div>
    </form>
  </section>
  {% endfor %}
</div>
{% else %}
<div class="saga-empty-line">
  The day is quiet so far. One capture is enough to begin the thread.
</div>
{% endif %}
