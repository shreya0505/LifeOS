{% if entries %}
<div class="saga-recent">
  {% for entry in entries %}
  <section class="saga-entry-row" x-data="{ open: false }">
    <button class="saga-entry-row__toggle"
            type="button"
            :aria-expanded="open.toString()"
            @click="open = !open">
      <span class="saga-entry-row__time">{{ entry.timestamp[11:16] }}</span>
      <span class="saga-entry-row__content">
        <span class="saga-entry-row__label">
          {{ entry.emotion_label }}{% if entry.secondary_emotion_label %} + {{ entry.secondary_emotion_label }}{% endif %}
        </span>
        {% if entry.note %}
        <span class="saga-entry-row__note">{{ entry.note_html | safe }}</span>
        {% endif %}
      </span>
      <span class="saga-entry-row__meta">
        {% if entry.dyad_type == "opposite" %}
        opposites / {{ entry.intensity }}
        {% elif entry.dyad_label %}
        {{ entry.dyad_label }} / {{ entry.intensity }}
        {% else %}
        {{ entry.emotion_family }} / {{ entry.intensity }}
        {% endif %}
      </span>
      <span class="saga-entry-row__chevron" aria-hidden="true"></span>
    </button>
    <form class="saga-entry-edit"
          x-show="open"
          x-collapse
          x-cloak
          hx-patch="/saga/entries/{{ entry.id }}"
          hx-target="#saga-recent"
          hx-swap="innerHTML">
      <label>
        <span>Family</span>
        <select name="emotion_family">
          {% for group in emotion_catalog %}
          <option value="{{ group.family }}"{% if group.family == entry.emotion_family %} selected{% endif %}>{{ group.label }}</option>
          {% endfor %}
        </select>
      </label>
      <label>
        <span>Word</span>
        <input name="emotion_label" value="{{ entry.emotion_label }}" maxlength="32">
      </label>
      <input type="hidden" name="secondary_emotion_family" value="{{ entry.secondary_emotion_family or '' }}">
      <input type="hidden" name="secondary_emotion_label" value="{{ entry.secondary_emotion_label or '' }}">
      <label>
        <span>Intensity</span>
        <input name="intensity" type="number" min="1" max="10" value="{{ entry.intensity }}">
      </label>
      <label class="saga-entry-edit__note">
        <span>Note</span>
        <textarea name="note" rows="4">{{ entry.note or "" }}</textarea>
      </label>
      <div class="saga-entry-edit__actions">
        <button type="submit">Save</button>
        <button type="button"
                hx-delete="/saga/entries/{{ entry.id }}"
                hx-target="#saga-recent"
                hx-swap="innerHTML">Delete</button>
      </div>
    </form>
  </section>
  {% endfor %}
</div>
{% else %}
<div class="saga-empty-line">
  The day is quiet so far. One capture is enough to begin the thread.
</div>
{% endif %}
