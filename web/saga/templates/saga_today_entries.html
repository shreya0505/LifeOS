{% if entries %}
<div class="saga-note-cards">
  {% for entry in entries %}
  <article class="saga-note-card saga-note-card--{{ entry.quadrant }}"
           style="--quadrant-accent: {{ entry.quadrant_accent }}">
    <div class="saga-note-card__body">{{ entry.note_html | safe }}</div>
    <footer>
      <time>{{ entry.timestamp[11:16] }}</time>
      <span class="saga-quadrant-badge">{{ entry.quadrant }}</span>
      <span>{{ entry.mood_word }} · E:{{ entry.energy }} P:{{ entry.pleasantness }}</span>
    </footer>
  </article>
  {% endfor %}
</div>
{% else %}
<div class="saga-empty-line">
  The day is quiet so far. One capture is enough to begin the page.
</div>
{% endif %}
