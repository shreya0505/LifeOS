{% extends "saga_base.html" %}

{% block content %}
<div class="saga-root" data-saga-root x-data="{ tab: 'today' }"
     x-init="$watch('tab', value => {
       document.querySelectorAll('.saga-nav-link[data-saga-tab]').forEach(btn => {
         btn.classList.toggle('is-active', btn.dataset.sagaTab === value);
       });
     })">

  <section class="saga-panel" x-show="tab === 'today'">
    <div class="saga-today"
         x-data='sagaMoodCapture({{ mood_catalog | tojson }})'
         x-init="init()">
      <div class="saga-today__prompt">
        <p class="saga-kicker">{{ today_label }}</p>
        <h1 class="saga-prompt">What are you feeling right now?</h1>
        <p class="saga-today__sub">Find the point where energy and pleasantness meet. The word can be approximate; the coordinates carry the signal.</p>
      </div>

      <form class="saga-capture"
            hx-post="/saga/entries"
            hx-swap="none"
            @htmx:after-request="if ($event.detail.successful) finishCapture()">
        <input type="hidden" name="energy" :value="selected ? selected.energy : ''">
        <input type="hidden" name="pleasantness" :value="selected ? selected.pleasantness : ''">
        <input type="hidden" name="mood_word" :value="selected ? selected.word : ''">

        <div class="saga-mood-preview"
             :class="{ 'is-empty': !previewCell() }"
             :style="'--quadrant-accent: ' + (previewCell() ? previewCell().accent : '#CF9D7B')">
          <div>
            <span x-text="previewCell() ? quadrantLabel(previewCell().quadrant) : 'Mood meter'"></span>
            <strong x-text="previewCell() ? previewCell().word : 'Name it'"></strong>
          </div>
          <p x-text="previewCell() ? coordsLabel(previewCell()) : 'Energy runs top to bottom. Pleasantness runs left to right.'"></p>
        </div>

        <div class="saga-mood-pad"
             aria-label="Yale mood meter"
             :style="'--energy-position: ' + axisEnergy() + '%; --pleasantness-position: ' + axisPleasantness() + '%; --quadrant-accent: ' + (previewCell() ? previewCell().accent : '#CF9D7B')">
          <div class="saga-mood-axis saga-mood-axis--energy" aria-hidden="true">
            <span></span>
          </div>
          <div class="saga-mood-axis saga-mood-axis--pleasantness" aria-hidden="true">
            <span></span>
          </div>
          <canvas id="saga-mood-fx" class="saga-mood-fx" aria-hidden="true"></canvas>
          <div class="saga-mood-grid" role="grid" aria-label="Energy by pleasantness mood grid">
            {% for cell in mood_catalog %}
            <button class="saga-mood-cell saga-mood-cell--{{ cell.quadrant }}{% if cell.energy > 0 %} saga-mood-cell--high{% else %} saga-mood-cell--low{% endif %}{% if cell.pleasantness < 0 %} saga-mood-cell--unpleasant{% else %} saga-mood-cell--pleasant{% endif %}"
                    type="button"
                    role="gridcell"
                    data-energy="{{ cell.energy }}"
                    data-pleasantness="{{ cell.pleasantness }}"
                    data-word="{{ cell.word }}"
                    data-quadrant="{{ cell.quadrant }}"
                    data-accent="{{ cell.accent }}"
                    :class="{
                      'is-hovered': hovered && hovered.energy === {{ cell.energy }} && hovered.pleasantness === {{ cell.pleasantness }},
                      'is-selected': selected && selected.energy === {{ cell.energy }} && selected.pleasantness === {{ cell.pleasantness }},
                      'is-dimmed': selected && !(selected.energy === {{ cell.energy }} && selected.pleasantness === {{ cell.pleasantness }})
                    }"
                    :aria-pressed="(selected ? (selected.energy === {{ cell.energy }} && selected.pleasantness === {{ cell.pleasantness }}) : false).toString()"
                    aria-label="{{ cell.word }}. Energy {{ cell.energy }}, pleasantness {{ cell.pleasantness }}."
                    style="--quadrant-accent: {{ cell.accent }}; --cell-fill: {{ (10 + cell.axis_intensity * 62) | round }}%; --cell-fade: {{ (3 + cell.axis_intensity * 26) | round }}%; --cell-text: {{ (30 + cell.axis_intensity * 42) | round }}%;"
                    @mouseenter="hoverCell({{ cell.energy }}, {{ cell.pleasantness }})"
                    @mouseleave="clearHover()"
                    @focus="hoverCell({{ cell.energy }}, {{ cell.pleasantness }})"
                    @keydown="moveFocus($event, {{ loop.index0 }})"
                    @click="toggleCell({{ cell.energy }}, {{ cell.pleasantness }})">
              <span>{{ cell.word }}</span>
            </button>
            {% endfor %}
          </div>
        </div>

        <div class="saga-mood-summary"
             x-show="selected"
             x-cloak
             :style="'--quadrant-accent: ' + (selected ? selected.accent : '#CF9D7B')">
          <span class="saga-quadrant-badge" x-text="selected ? quadrantLabel(selected.quadrant) : ''"></span>
          <strong x-text="selected ? selected.word : ''"></strong>
          <em x-text="selected ? coordsLabel(selected) : ''"></em>
        </div>

        <label class="saga-note">
          <span class="saga-note__prompt">What is on your mind today?</span>
          <textarea name="note" rows="5"
                    x-ref="noteInput"
                    x-model="note"
                    placeholder="Write a note..."></textarea>
        </label>

        <div class="saga-capture__footer">
          <p class="saga-confirm" x-text="confirmation"></p>
          <button class="saga-capture__submit" type="submit" :disabled="!canSubmit()">Save</button>
        </div>
      </form>
    </div>
  </section>

  <section class="saga-panel" x-show="tab === 'timeline'">
    <div id="saga-timeline-slot"
         hx-get="/saga/timeline"
         hx-trigger="load, saga-changed from:body, quest-done from:body, refresh"
         hx-swap="innerHTML">
    </div>
  </section>

  <section class="saga-panel" x-show="tab === 'metrics'">
    <div id="saga-metrics-slot"
         hx-get="/saga/metrics"
         hx-trigger="load, saga-changed from:body, quest-done from:body, refresh"
         hx-swap="innerHTML">
    </div>
  </section>
</div>

<script src="/static/anime.min.js"></script>
<script src="/static/saga_mood.js"></script>
{% endblock %}
