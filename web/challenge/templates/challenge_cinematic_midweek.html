{% extends "challenge_base.html" %}
{% set active_tab = 'today' %}
{% block page_subtitle %}Mid-week tier{% endblock %}

{% block content %}
<div class="ch-cinema ch-cinema-midweek-fs">
  <div class="ch-ember-drift" id="ch-ember-drift"></div>
  <div class="ch-midweek-rule ch-midweek-rule--top"></div>
  <div class="ch-cinema-core ch-midweek-core">
    <p class="ch-cinema-eyebrow ch-midweek-eyebrow">mid-week · day {{ days_elapsed }}</p>
    <div class="ch-sigil ch-midweek-sigil">
      <svg viewBox="0 0 100 100" width="60" height="60" aria-hidden="true">
        <circle cx="50" cy="50" r="44" fill="none" stroke="currentColor" stroke-width="1"/>
        <polygon points="50,12 88,50 50,88 12,50" fill="none" stroke="currentColor" stroke-width="1"/>
      </svg>
    </div>
    <h2 class="ch-cinema-title ch-midweek-title">{{ level_name }}</h2>
    <p class="ch-cinema-prose ch-midweek-prose">step held.</p>
  </div>
  <div class="ch-midweek-rule ch-midweek-rule--bot"></div>
</div>
<script>
  if (window.chEmberDrift) window.chEmberDrift();
  setTimeout(() => location.href='/challenge/today', 2800);
</script>
{% endblock %}
