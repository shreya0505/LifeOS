{# Flush task row. Used inside day form and as HTMX swap target. #}
<div class="ch-task-row{% if task.current_state %} is-rated{% elif task.bucket != 'enricher' %} is-unrated is-tracked{% endif %}{% if is_sealed_today %} is-locked{% endif %}"
     id="task-{{ task.id }}"
     x-data="{ notesOpen: {{ 'true' if task.current_notes else 'false' }} }">
  <form class="ch-task-row__form"
        hx-post="/challenge/today/entry/{{ task.id }}"
        hx-target="#task-{{ task.id }}"
        hx-swap="outerHTML"
        hx-trigger="change from:input[type=radio] delay:80ms">
    <div class="ch-task-name">{{ task.name }}</div>
    {% set sel_idx = states.index(task.current_state) if task.current_state in states else -1 %}
    <div class="ch-slider{% if sel_idx >= 0 %} is-set lvl-{{ sel_idx }}{% endif %}"
         role="radiogroup" aria-label="State">
      <div class="ch-slider__track">
        {% for s in states %}
        <label class="ch-slider__seg ch-slider__seg-{{ s | lower }}{% if loop.index0 <= sel_idx %} is-lit{% endif %}{% if task.current_state == s %} is-selected{% endif %}"
               title="{{ state_labels[s] }}"
               aria-label="{{ state_labels[s] }}"
               style="--seg-idx: {{ loop.index0 }};">
          <input type="radio" name="state" value="{{ s }}"
                 {% if task.current_state == s %}checked{% endif %}
                 {% if is_sealed_today %}disabled{% endif %}>
          <span class="ch-slider__bar"></span>
        </label>
        {% endfor %}
      </div>
      <div class="ch-slider__caption ch-slider__cap-{{ task.current_state | lower if task.current_state else 'none' }}">
        {{ state_short[task.current_state] if task.current_state else '— RATE —' }}
      </div>
    </div>
    <button type="button"
            class="ch-notes-toggle{% if task.current_notes %} has-notes{% endif %}"
            @click="notesOpen = !notesOpen"
            :aria-expanded="notesOpen"
            {% if is_sealed_today %}disabled aria-disabled="true"{% endif %}
            aria-label="Toggle notes">✎</button>
    <div class="ch-notes-row" x-show="notesOpen" x-cloak>
      <textarea class="ch-task-notes" name="notes"
                placeholder="Notes…"
                {% if is_sealed_today %}readonly{% endif %}
                hx-post="/challenge/today/entry/{{ task.id }}"
                hx-target="#task-{{ task.id }}"
                hx-swap="outerHTML"
                hx-trigger="blur changed">{{ task.current_notes }}</textarea>
    </div>
  </form>
</div>
